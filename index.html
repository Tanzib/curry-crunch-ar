<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>KFC Curry Crunch — 3D / AR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  :root{
    --kfc-red:#e4002b; --kfc-red-dk:#b00021; --char:#1a1410;
    --cream:#fbf6ee; --gold:#e9a93c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #2a1410 0%, #160a07 55%, #0c0604 100%);
    color:var(--cream); min-height:100dvh; display:flex; flex-direction:column;
    overflow-x:hidden;
  }
  /* charred speckle atmosphere */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(233,169,60,.10) 1px, transparent 1px);
    background-size:26px 26px;
  }
  header{padding:22px 20px 6px; text-align:center; z-index:2}
  .eyebrow{
    font-size:12px; letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold); font-weight:700; padding-left:.42em;
  }
  h1{
    font-family:"Arial Black","Helvetica Neue",sans-serif; font-weight:900;
    font-size:clamp(34px,12vw,58px); line-height:.92; margin-top:8px;
    color:#fff; text-shadow:0 3px 0 var(--kfc-red-dk);
    letter-spacing:-.01em;
  }
  h1 .red{color:var(--kfc-red)}
  .tag{margin-top:10px; font-size:14px; color:#e9d9c6; opacity:.85; font-style:italic}

  .stage{flex:1; position:relative; min-height:46dvh}
  model-viewer{
    width:100%; height:100%; position:absolute; inset:0;
    --poster-color:transparent;
  }
  /* spice ring under the model */
  .stage::after{
    content:""; position:absolute; left:50%; bottom:13%; transform:translateX(-50%);
    width:58%; height:24px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(228,0,43,.30), transparent 75%);
    filter:blur(4px); pointer-events:none;
  }

  .hint{
    position:absolute; left:0; right:0; bottom:8px; text-align:center;
    font-size:12.5px; letter-spacing:.05em; color:#d8c4ad; pointer-events:none;
    transition:opacity .5s; z-index:3;
  }
  .hint span{display:inline-flex; align-items:center; gap:7px}
  .spin{width:15px;height:15px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;display:inline-block;animation:r 1.6s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}

  .actions{padding:6px 18px 26px; display:flex; flex-direction:column; gap:11px; z-index:2}
  button.ar{
    appearance:none; border:none; cursor:pointer;
    background:linear-gradient(180deg,var(--kfc-red),var(--kfc-red-dk));
    color:#fff; font-weight:800; font-size:17px; letter-spacing:.04em;
    padding:16px; border-radius:15px; box-shadow:0 8px 22px rgba(228,0,43,.4);
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition:transform .1s, box-shadow .2s;
  }
  button.ar:active{transform:scale(.97)}
  .meta{
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
    font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#caa;
  }
  .chip{
    background:rgba(255,255,255,.06); border:1px solid rgba(233,169,60,.3);
    color:#e9d9c6; padding:6px 11px; border-radius:999px;
  }
  .progress{
    position:absolute; top:0; left:0; height:3px; width:0%;
    background:linear-gradient(90deg,var(--gold),var(--kfc-red)); transition:width .2s; z-index:5;
  }
  footer{text-align:center; font-size:10px; letter-spacing:.18em; color:#7a5; opacity:.55; padding-bottom:14px; text-transform:uppercase}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}
</style>
</head>
<body>
  <div class="progress" id="bar"></div>

  <header>
    <div class="eyebrow">KFC&nbsp;Bangladesh&nbsp;·&nbsp;New</div>
    <h1>CURRY <span class="red">CRUNCH</span></h1>
    <p class="tag">Hot &amp; Crispy chicken, Chettinad spice &amp; curry leaf.</p>
  </header>

  <div class="stage">
    <model-viewer
      id="mv"
      src="curry_crunch.glb"
      alt="3D model of KFC Curry Crunch fried chicken"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="26deg"
      interaction-prompt="none"
      shadow-intensity="1.1"
      shadow-softness="0.9"
      exposure="1.15"
      environment-image="neutral"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      camera-orbit="40deg 75deg 0.42m"
      min-camera-orbit="auto auto 0.18m"
      max-camera-orbit="auto auto 0.9m"
      field-of-view="32deg">
      <div class="hint" id="hint"><span><span class="spin"></span> Loading…</span></div>
    </model-viewer>
  </div>

  <div class="actions">
    <button class="ar" id="arBtn">📱&nbsp; View it on your table (AR)</button>
    <div class="meta">
      <span class="chip">Drag to rotate</span>
      <span class="chip">Pinch to zoom</span>
      <span class="chip">No app needed</span>
    </div>
  </div>

  <footer>Finger Lickin’ Good</footer>

<script>
  const mv   = document.getElementById('mv');
  const hint = document.getElementById('hint');
  const bar  = document.getElementById('bar');
  const btn  = document.getElementById('arBtn');

  mv.addEventListener('progress', e=>{
    const p = e.detail.totalProgress*100;
    bar.style.width = p+'%';
    if(p>=100){ setTimeout(()=>bar.style.opacity=0,400); }
  });
  mv.addEventListener('load', ()=>{
    hint.innerHTML = '<span>👆 Drag to spin · pinch to zoom</span>';
    setTimeout(()=>hint.style.opacity=0, 4200);
  });
  // pause auto-rotate once the user grabs it
  mv.addEventListener('camera-change', e=>{
    if(e.detail.source==='user-interaction') mv.removeAttribute('auto-rotate');
  });

  // AR button: trigger model-viewer's AR, hide if unsupported
  btn.addEventListener('click', ()=> mv.activateAR());
  mv.addEventListener('ar-status', e=>{
    if(e.detail.status==='failed') btn.textContent='AR not supported on this device';
  });
  // hide AR button entirely if the platform can't do AR
  customElements.whenDefined('model-viewer').then(()=>{
    if(!mv.canActivateAR){ btn.style.display='none'; }
  });
</script>
</body>
</html>
